# Build the Vite app and push `dist/` to the `gh_pages` branch.
# GitHub Pages: Settings → Pages → Source = branch `gh_pages` / folder `/ (root)`.
# Does not run on pushes to `gh_pages` (that branch is build output only).
#
# Deploy uses the same git clone as actions/checkout (credential helper). A separate
# `git init` under dist/ pushes without that auth and often gets HTTP 403.
#
# If push still returns 403: Settings → Actions → General → Workflow permissions →
# "Read and write permissions" (org/repo may default to read-only for GITHUB_TOKEN).

name: Deploy to gh_pages branch

# Quote `on` — YAML 1.1 treats bare `on` as boolean true, which breaks push triggers.
'on':
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-gh-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Project pages are served under /<repo>/; see README for user.github.io repos.
          VITE_BASE_URL: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Deploy to gh_pages branch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mv dist /tmp/site-dist

          git fetch origin gh_pages 2>/dev/null || true
          if git rev-parse --verify refs/remotes/origin/gh_pages >/dev/null 2>&1; then
            git checkout -B gh_pages origin/gh_pages
          else
            git checkout --orphan gh_pages
            git rm -rf . >/dev/null 2>&1 || true
          fi

          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -a /tmp/site-dist/. .

          git add -A
          if git diff --staged --quiet; then
            echo "No changes; skipping push."
            exit 0
          fi

          git commit -m "Deploy ${{ github.sha }}"
          git push origin HEAD:gh_pages --force
