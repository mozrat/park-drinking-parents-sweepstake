# Build the Vite app and push `dist/` to the `gh_pages` branch.
# GitHub Pages: Settings → Pages → Source = branch `gh_pages` / folder `/ (root)`.
# Does not run on pushes to `gh_pages` (that branch is build output only).

name: Deploy to gh_pages branch

# Quote `on` — YAML 1.1 treats bare `on` as boolean true, which breaks push triggers.
'on':
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-gh-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Project pages are served under /<repo>/; see README for user.github.io repos.
          VITE_BASE_URL: /${{ github.event.repository.name }}/
        run: npm run build

      # Push dist/ with git so we do not depend on fetching a third-party action tarball from codeload.
      - name: Deploy to gh_pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd dist
          git init -b gh_pages
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .
          if git diff --staged --quiet; then
            echo "No changes in dist; skipping push."
            exit 0
          fi
          git commit -m "Deploy ${{ github.sha }}"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push --force origin gh_pages
