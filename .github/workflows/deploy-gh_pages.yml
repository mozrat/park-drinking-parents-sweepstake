# Builds the Vite site and pushes ./dist to branch gh_pages.
# Pages: Settings -> Pages -> Deploy from a branch -> gh_pages / (root)
#
# Triggers on pushes to main or master (source code), NOT on pushes to gh_pages.
# If this never runs: repo Settings -> Actions -> General must allow Actions;
# the commit must exist on GitHub main; branch filters must match your default branch name.

name: Deploy to gh_pages branch

run-name: "Deploy gh_pages (${{ github.ref_name }})"

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh_pages_deploy
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_URL: /${{ github.event.repository.name }}/

      - name: Verify production bundle
        run: |
          if grep -q 'src/main.tsx' dist/index.html; then
            echo "::error::dist/index.html still references dev entrypoint."
            exit 1
          fi
          echo "OK: dist/index.html is a production bundle."

      - name: Push dist to gh_pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh_pages
          force_orphan: true
